<!DOCTYPE html>
<html lang="zh-HK" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="2026 美加墨世界盃完整賽程即時比分 香港時間HKT">
<title>2026 世界盃賽程 HKT</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0F172A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0F172A;--card:#1E293B;--card2:#243348;--border:rgba(255,255,255,0.07);
  --text:#E2E8F0;--muted:#94A3B8;--faint:#475569;
  --accent:#a080ea;--accent2:#f25e8b;--live:#22c55e;--draw:#f59e0b;
  --r-sm:6px;--r-md:10px;--r-lg:16px;
  --fd:'Bebas Neue',sans-serif;--fb:'Inter',sans-serif;
  --gA:#0052FF;--gB:#FF5A1F;--gC:#00D2C4;--gD:#FF007A;
  --gE:#7928CA;--gF:#FF9900;--gG:#D4ED17;--gH:#C5A880;
  --gI:#E0A899;--gJ:#3A5046;--gK:#0A2540;--gL:#888888;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;font-size:16px}
body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100dvh;line-height:1.6}
img{display:block;max-width:100%;height:auto}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
a{color:inherit;text-decoration:none}

/* Shimmer */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.sk{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:var(--r-sm)}

/* Live pulse */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.live-dot{display:inline-block;width:7px;height:7px;background:var(--live);border-radius:50%;animation:pulse 1.2s ease-in-out infinite;margin-right:4px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* HEADER */
header{
  position:sticky;top:0;z-index:200;
  background:rgba(15,23,42,.94);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:10px 16px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{font-size:1.5rem;line-height:1}
.logo-text{font-family:var(--fd);font-size:clamp(1rem,3vw,1.4rem);letter-spacing:.05em;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.api-pill{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);
  background:var(--card);padding:4px 10px;border-radius:var(--r-sm);border:1px solid var(--border);white-space:nowrap}
#quota{color:var(--accent);font-weight:700}
.btn-refresh{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;padding:6px 12px;border-radius:var(--r-sm);transition:opacity .18s;white-space:nowrap}
.btn-refresh:hover{opacity:.85}
.btn-refresh svg{width:13px;height:13px}
.btn-refresh.loading svg{animation:spin .7s linear infinite}

/* NAV TABS */
.nav-tabs{
  display:flex;align-items:center;gap:4px;
  padding:10px 16px;overflow-x:auto;scrollbar-width:none;
  border-bottom:1px solid var(--border);background:rgba(15,23,42,.7);
  position:sticky;top:53px;z-index:100;backdrop-filter:blur(12px);
}
.nav-tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:6px 14px;border-radius:var(--r-sm);font-size:12px;
  color:var(--muted);border:1px solid transparent;transition:all .16s;white-space:nowrap;font-weight:500}
.tab:hover{color:var(--text);background:var(--card)}
.tab.on{color:#fff;background:var(--card2);border-color:var(--border);font-weight:700}
.tab[data-g]{border-left-width:3px;border-left-style:solid;border-left-color:var(--gc,var(--faint))}

/* LAYOUT */
main{max-width:1200px;margin:0 auto;padding:20px 16px;
  display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
@media(max-width:900px){main{grid-template-columns:1fr;padding:14px 12px;padding-bottom:80px}}

/* SECTION HEAD */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-title{font-family:var(--fd);font-size:clamp(1rem,2.5vw,1.3rem);letter-spacing:.08em}
.count-badge{font-size:11px;color:var(--muted);background:var(--card);
  padding:3px 10px;border-radius:var(--r-sm);border:1px solid var(--border)}

/* DATE GROUP */
.dg{margin-bottom:24px}
.date-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.1em;padding:6px 0;margin-bottom:10px;
  border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.date-lbl.today{color:var(--accent)}

/* MATCH CARD */
.mc{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);
  padding:14px 16px 10px;margin-bottom:10px;
  display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;
  position:relative;overflow:hidden;transition:background .16s,box-shadow .16s;
}
.mc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gc,var(--faint))}
.mc:hover{background:var(--card2);box-shadow:0 4px 20px rgba(0,0,0,.25)}
.mc.live{border-color:rgba(34,197,94,.3);box-shadow:0 0 0 1px rgba(34,197,94,.12)}
.mc.live::before{background:var(--live)}
.mc.done{opacity:.72}

/* Team block */
.tb{display:flex;flex-direction:column;align-items:flex-end;gap:5px;text-align:right}
.tb.away{align-items:flex-start;text-align:left}
@media(max-width:400px){.tb,.tb.away{align-items:center;text-align:center}}
.flag{width:38px;height:26px;border-radius:3px;object-fit:cover;background:var(--card2);flex-shrink:0}
.tname{font-size:13px;font-weight:600;color:var(--text);max-width:110px;word-break:keep-all;line-height:1.3}

/* Score */
.sc{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:78px}
.score{font-family:var(--fd);font-size:clamp(1.3rem,3.5vw,1.9rem);letter-spacing:.06em;line-height:1}
.score.empty{font-family:var(--fb);font-size:13px;font-weight:700;color:var(--accent)}
.mtime{font-size:11px;color:var(--muted)}
.badge{font-size:10px;font-weight:700;letter-spacing:.06em;padding:2px 6px;border-radius:3px;text-transform:uppercase}
.b-live{background:rgba(34,197,94,.15);color:var(--live)}
.b-ft{background:rgba(148,163,184,.1);color:var(--muted)}
.b-draw{background:rgba(245,158,11,.12);color:var(--draw)}

/* Card footer */
.mc-foot{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:6px;margin-top:6px;padding-top:7px;border-top:1px solid var(--border)}
.stage-chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;
  background:color-mix(in srgb,var(--gc,var(--faint)) 15%,transparent);
  color:var(--gc,var(--muted));
  border:1px solid color-mix(in srgb,var(--gc,var(--faint)) 28%,transparent);white-space:nowrap}
.meta-info{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.meta-item{font-size:10px;color:var(--faint);display:flex;align-items:center;gap:3px}
.tv-chip{font-size:10px;color:var(--muted);background:rgba(160,128,234,.1);
  border:1px solid rgba(160,128,234,.2);padding:2px 7px;border-radius:3px;white-space:nowrap}
.viu{background:rgba(242,94,139,.1);border-color:rgba(242,94,139,.25);color:#f25e8b}
.now-tv{background:rgba(0,82,255,.1);border-color:rgba(0,82,255,.25);color:#6699ff}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;gap:16px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden}
.ph{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-bottom:1px solid var(--border)}
.ph-title{font-family:var(--fd);font-size:1rem;letter-spacing:.08em;
  display:flex;align-items:center;gap:6px}
.gdot{width:9px;height:9px;border-radius:50%}

/* Standings table */
.stb{width:100%;border-collapse:collapse}
.stb th{font-size:10px;color:var(--faint);font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;padding:6px 10px;text-align:center}
.stb th:first-child{text-align:left}
.stb td{font-size:11px;padding:6px 10px;text-align:center;border-top:1px solid var(--border)}
.stb td:first-child{text-align:left}
.stb .pts{font-weight:700;color:var(--accent)}
.tcell{display:flex;align-items:center;gap:6px}
.fsm{width:20px;height:14px;border-radius:2px;object-fit:cover;background:var(--card2)}
.adv td:first-child .tname-sm::after{content:'↑';font-size:9px;color:var(--live);margin-left:3px}

/* RSS FEED */
#rss-news-feed{background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden}
.rss-hdr{padding:10px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
  font-family:var(--fd);font-size:1rem;letter-spacing:.06em}
.rss-icon{width:16px;height:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rss-list{list-style:none;padding:0;margin:0}
.rss-item{padding:10px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:3px}
.rss-item:first-child{border-top:none}
.rss-item a{color:var(--text);font-size:12px;font-weight:500;line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rss-item a:hover{color:var(--accent)}
.rss-item time{font-size:10px;color:var(--faint)}
.rss-source{font-size:10px;color:var(--faint);background:var(--card2);
  padding:1px 6px;border-radius:3px;width:fit-content}
.rss-empty{padding:32px 16px;text-align:center;color:var(--faint)}
.rss-empty .icon{font-size:1.8rem;margin-bottom:8px}
.rss-empty p{font-size:12px;margin-top:4px}
/* RSS loading state */
.rss-loading{padding:24px;display:flex;flex-direction:column;gap:10px}
.rss-sk-line{height:12px;border-radius:3px}
.rss-sk-short{height:10px;width:60%;border-radius:3px}

/* EMPTY STATE */
.empty{display:flex;flex-direction:column;align-items:center;text-align:center;
  padding:60px 24px;color:var(--muted)}
.empty .icon{font-size:2.5rem;margin-bottom:12px}
.empty h3{color:var(--text);font-size:15px;margin-bottom:6px}
.empty p{font-size:13px;max-width:28ch}

/* SKELETON CARD */
.sk-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);
  padding:14px 16px;margin-bottom:10px;
  display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:center}
.sk-t{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.sk-t.r{align-items:flex-start}
.sk-flag{width:38px;height:26px;border-radius:3px}
.sk-name{height:13px;width:75px;border-radius:3px}
.sk-score{width:65px;height:28px;border-radius:4px}

/* BOTTOM BAR */
.bot-bar{display:none;position:fixed;bottom:0;left:0;right:0;
  background:rgba(15,23,42,.96);backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  padding:6px 4px calc(6px + env(safe-area-inset-bottom));z-index:200;gap:2px}
@media(max-width:600px){.bot-bar{display:flex}}
.bot-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 4px;border-radius:var(--r-sm);font-size:10px;color:var(--muted);
  transition:color .16s,background .16s}
.bot-tab.on{color:var(--accent);background:rgba(160,128,234,.1)}
.bot-tab svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:2}

/* UTILITIES */
.hidden{display:none!important}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-icon">⚽</span>
    <span class="logo-text">WC 2026 · HKT</span>
  </div>
  <div class="hdr-right">
    <div class="api-pill">
      <span id="api-dot" style="color:var(--faint)">●</span>
      <span id="upd">載入中…</span>
      <span style="color:var(--faint)">│</span>
      剩餘 <span id="quota">—</span>
    </div>
    <button class="btn-refresh" id="btn-ref" onclick="manualRefresh()">
      <svg id="ref-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
      </svg>
      更新
    </button>
  </div>
</header>

<nav class="nav-tabs" id="navtabs">
  <button class="tab on" onclick="sw('all',this)">全部</button>
  <button class="tab" onclick="sw('live',this)">🔴 即時</button>
  <button class="tab" onclick="sw('today',this)">📅 今日</button>
  <button class="tab" onclick="sw('group',this)">小組賽</button>
  <button class="tab" onclick="sw('ko',this)">淘汰賽</button>
</nav>

<main>
  <section>
    <div class="sec-head">
      <span class="sec-title" id="sec-title">所有賽事</span>
      <span class="count-badge" id="cnt">104 場賽事</span>
    </div>
    <div id="mlist">
      <div style="height:13px;width:130px;margin-bottom:14px" class="sk"></div>
      <div class="sk-card"><div class="sk-t"><div class="sk-flag sk"></div><div class="sk-name sk"></div></div><div class="sk-score sk"></div><div class="sk-t r"><div class="sk-flag sk"></div><div class="sk-name sk"></div></div></div>
      <div class="sk-card"><div class="sk-t"><div class="sk-flag sk"></div><div class="sk-name sk"></div></div><div class="sk-score sk"></div><div class="sk-t r"><div class="sk-flag sk"></div><div class="sk-name sk"></div></div></div>
      <div class="sk-card"><div class="sk-t"><div class="sk-flag sk"></div><div class="sk-name sk"></div></div><div class="sk-score sk"></div><div class="sk-t r"><div class="sk-flag sk"></div><div class="sk-name sk"></div></div></div>
    </div>

  <aside class="sidebar">
    <div id="standings-wrap">
      <div class="panel" style="padding:28px 16px;text-align:center;color:var(--faint);font-size:12px">

      </div>
    </div>
    <div id="rss-news-feed">
      <div class="rss-hdr">
        <div class="rss-icon">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="white">
            <circle cx="6" cy="18" r="3"/>
            <path d="M4 4a16 16 0 0 1 16 16" stroke="white" stroke-width="2" fill="none"/>
            <path d="M4 10a10 10 0 0 1 10 10" stroke="white" stroke-width="2" fill="none"/>
          </svg>
        </div>
        新聞快訊
      </div>
      <div id="rss-body">
        <div class="rss-empty">
          <div class="icon">📡</div>
          <p>RSS 新聞源待接入</p>
          <p style="font-size:10px;margin-top:4px;color:var(--faint)">配置 RSS_FEED_URL 後自動顯示</p>
        </div>
      </div>
    </div>
  </aside>
</main>

<nav class="bot-bar">
  <button class="bot-tab on" onclick="sw('all',this);setBot(this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    全部
  </button>
  <button class="bot-tab" onclick="sw('live',this);setBot(this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/></svg>
    即時
  </button>
  <button class="bot-tab" onclick="sw('today',this);setBot(this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    今日
  </button>
  <button class="bot-tab" onclick="sw('group',this);setBot(this)">
    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    小組
  </button>
  <button class="bot-tab" onclick="sw('ko',this);setBot(this)">
    <svg viewBox="0 0 24 24"><polyline points="18 8 22 12 18 16"/><polyline points="6 8 2 12 6 16"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
    淘汰
  </button>
</nav>

<script>
/* ─── CONFIG ─── */
const API  = 'https://api.zafronix.com/fifa/worldcup/v1';
const KEY  = 'zwc_free_167b5bcc367d0b97e29c7c5c';
const HDR  = {'X-API-Key': KEY};
const MAX  = 100;
const RSS_FEED_URL = ''; /* 配置 RSS Feed URL */

const GC = {
  A:'#0052FF',B:'#FF5A1F',C:'#00D2C4',D:'#FF007A',
  E:'#7928CA',F:'#FF9900',G:'#D4ED17',H:'#C5A880',
  I:'#E0A899',J:'#3A5046',K:'#0A2540',L:'#888888'
};

const FLAG = {
  '墨西哥':'mx','南非':'za','南韓':'kr','捷克':'cz','加拿大':'ca',
  '波士尼亞與赫塞哥維納':'ba','美國':'us','巴拉圭':'py','卡達':'qa',
  '瑞士':'ch','巴西':'br','摩洛哥':'ma','海地':'ht','蘇格蘭':'gb-sct',
  '澳洲':'au','土耳其':'tr','德國':'de','庫拉索':'cw','荷蘭':'nl',
  '日本':'jp','象牙海岸':'ci','厄瓜多':'ec','瑞典':'se','突尼西亞':'tn',
  '西班牙':'es','維德角':'cv','比利時':'be','埃及':'eg',
  '沙烏地阿拉伯':'sa','烏拉圭':'uy','伊朗':'ir','紐西蘭':'nz',
  '法國':'fr','塞內加爾':'sn','伊拉克':'iq','挪威':'no',
  '阿根廷':'ar','阿爾及利亞':'dz','奧地利':'at','約旦':'jo',
  '葡萄牙':'pt','剛果民主共和國':'cd','英格蘭':'gb-eng','克羅埃西亞':'hr',
  '迦納':'gh','巴拿馬':'pa','烏茲別克':'uz','哥倫比亞':'co'
};

function flagUrl(n){
  const iso=FLAG[n]; if(!iso) return '';
  return `https://flagcdn.com/w40/${iso}.png`;

let apiScores = {};
let curTab    = 'all';

function getQ(){ return parseInt(sessionStorage.getItem('wq')||'0') }
function addQ(n=1){
  const q=getQ()+n; sessionStorage.setItem('wq',q);
  document.getElementById('quota').textContent=MAX-q; return q;
}
function canQ(){ return getQ()<MAX }

/* ─── TIME HELPERS ─── */
function todayHKT(){
  return new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Hong_Kong'});
}
function fmtDate(d){
  const dt=new Date(d+'T00:00:00+08:00');
  return dt.toLocaleDateString('zh-HK',{timeZone:'Asia/Hong_Kong',month:'long',day:'numeric',weekday:'short'});
}
function fmtTime(t){
  if(!t||t==='待定') return '待定';
  const [h,m]=t.split(':').map(Number);
  if(h===0) return `凌晨 12:${String(m).padStart(2,'0')}`;
  if(h<6)   return `凌晨 ${h}:${String(m).padStart(2,'0')}`;
  if(h<12)  return `早上 ${h}:${String(m).padStart(2,'0')}`;
  if(h===12)return `中午 12:${String(m).padStart(2,'0')}`;
  if(h<18)  return `下午 ${h-12}:${String(m).padStart(2,'0')}`;
  return `晚上 ${h-12}:${String(m).padStart(2,'0')}`;
}

/* ─── RENDER ─── */
function tvChips(tv){
  if(!tv) return '';
  let out='';
  if(tv.includes('Viu')) out+=`<span class="tv-chip viu">📺 Viu TV 99</span>`;
  if(tv.includes('618')) out+=`<span class="tv-chip now-tv">📺 Now 618/616</span>`;
  if(tv.includes('619')) out+=`<span class="tv-chip now-tv">📺 Now 619/617</span>`;
  return out;
}

function renderCard(m){
  const sc=apiScores[m.id];
  const hs = sc?.homeScore ?? m.homeScore;
  const as = sc?.awayScore ?? m.awayScore;
  const done = sc?.status==='ft'||sc?.status==='finalized'||m.finished;
  const live = sc?.status==='live';
  const gc = m.group ? GC[m.group] : '#a080ea';
  const hf=flagUrl(m.home), af=flagUrl(m.away);

  let scoreHtml;
  if(live){
    scoreHtml=`<div class="score">${hs??0} - ${as??0}</div>
    <span class="badge b-live"><span class="live-dot"></span>${sc.liveMinute?sc.liveMinute+"'":"LIVE"}</span>`;
  }else if(done && hs!=null){
    const isDraw = hs===as;
    scoreHtml=`<div class="score">${hs} - ${as}</div>
    <span class="badge ${isDraw?'b-draw':'b-ft'}">${isDraw?'平局':'FT'}</span>`;
  }else{
    scoreHtml=`<div class="score empty">${fmtTime(m.time)}</div>
    <div class="mtime">HKT · 場次 ${m.no}</div>`;
  }

  const stageChip=`<span class="stage-chip" style="--gc:${gc}">${m.stage}</span>`;
  const tvH=tvChips(m.tv);
  const venueH=`<span class="meta-item">🏟 ${m.city}</span>`;

  return `<div class="mc${live?' live':''}${done?' done':''}" style="--gc:${gc}">
  <div class="tb">
    ${hf?`<img class="flag" src="${hf}" alt="${m.home}" loading="lazy" width="38" height="26" onerror="this.style.display='none'">`:''}
    <div class="tname">${m.home}</div>
  </div>
  <div class="sc">${scoreHtml}</div>
  <div class="tb away">
    ${af?`<img class="flag" src="${af}" alt="${m.away}" loading="lazy" width="38" height="26" onerror="this.style.display='none'">`:''}
    <div class="tname">${m.away}</div>
  </div>
  <div class="mc-foot">
    ${stageChip}
    <div class="meta-info">${venueH}${tvH}</div>
  </div>
</div>`;
}

function getFiltered(){
  const today=todayHKT();
  if(curTab==='live') return MATCHES.filter(m=>apiScores[m.id]?.status==='live');
  if(curTab==='today') return MATCHES.filter(m=>m.date===today);
  if(curTab==='group') return MATCHES.filter(m=>m.stageKey==='group');
  if(curTab==='ko') return MATCHES.filter(m=>m.stageKey!=='group');
  if(curTab.startsWith('G_')){
    const g=curTab.slice(2); return MATCHES.filter(m=>m.group===g);
  }
  return MATCHES;
}

function renderAll(){
  const list=getFiltered();
  const today=todayHKT();
  const byDate={};
  list.forEach(m=>{ if(!byDate[m.date]) byDate[m.date]=[]; byDate[m.date].push(m); });
  const dates=Object.keys(byDate).sort();

  let html='';
  if(!dates.length){
    html=`<div class="empty"><div class="icon">⚽</div><h3>暫無賽事</h3><p>此分類目前沒有比賽</p></div>`;
  }else{
    dates.forEach(d=>{
      const isT=d===today;
      html+=`<div class="dg">
        <div class="date-lbl${isT?' today':''}">
          ${isT?'📅 今日 — ':''}${fmtDate(d)}
        </div>`;
      byDate[d].forEach(m=>{ html+=renderCard(m); });
      html+='</div>';
    });
  }

  document.getElementById('mlist').innerHTML=html;
  document.getElementById('cnt').textContent=`${list.length} 場賽事`;
  const titles={all:'所有賽事',live:'🔴 即時比賽',today:'📅 今日賽事',group:'小組賽',ko:'淘汰賽'};
  const t=titles[curTab]||(curTab.startsWith('G_')?curTab.slice(2)+'組 賽事':'賽事');
  document.getElementById('sec-title').textContent=t;
}

/* ─── API ─── */
async function fetchAll(){
  if(!canQ()){ setStatus('⚠ 今日配額已用盡','#FF9900'); return; }
  setLoading(true);
  try{
    const hdrs={...HDR};
    const etag=sessionStorage.getItem('wc_etag');
    if(etag) hdrs['If-None-Match']=etag;
    const res=await fetch(`${API}/matches?year=2026`,{headers:hdrs});
    if(res.status===304){ setStatus('✓ 已是最新','#22c55e'); }
    else if(res.ok){
      addQ();
      const ne=res.headers.get('ETag');
      if(ne) sessionStorage.setItem('wc_etag',ne);
      const j=await res.json();
      mergeApi(j.data||[]);
      setStatus('✓ API 已更新','#22c55e');
    }else{ setStatus('API '+ res.status,'#f25e8b'); }
  }catch(e){ setStatus('網絡錯誤','#FF9900'); }
  setLoading(false);
  renderAll();
}

async function fetchStandings(){
  if(!canQ()) return;
  try{
    const res=await fetch(`${API}/standings?year=2026`,{headers:HDR});
    if(res.status===402) return;
    if(res.ok){ addQ(); const j=await res.json(); renderStandings(j.groups||j.data||{}); }
  }catch(e){}
}

function mergeApi(data){
  data.forEach(m=>{
    if(m.homeScore!=null||m.awayScore!=null||m.status){
      apiScores[m.id]={homeScore:m.homeScore,awayScore:m.awayScore,status:m.status,liveMinute:m.liveMinute};
    }  
  });
}

/* ─── STANDINGS ─── */
function renderStandings(groups){
  const show = ['A','B','C','D','E','F','G','H','I','J','K','L'];
  let html='';
  show.forEach(g=>{
    if(!groups[g]) return;
    const gc=GC[g];
    html+=`<div class="panel" style="margin-bottom:12px">
      <div class="ph">
        <span class="ph-title"><span class="gdot" style="background:${gc}"></span>${g} 組積分榜</span>
      </div>
      <table class="stb">
        <thead><tr><th>球隊</th><th>場</th><th>勝</th><th>平</th><th>負</th><th>分</th></tr></thead>
        <tbody>`;
    groups[g].forEach(t=>{
      const f=flagUrl(t.team);
      html+=`<tr${t.advanced?' class="adv"':''}>
        <td><div class="tcell">
          ${f?`<img class="fsm" src="${f}" alt="${t.team}" loading="lazy" width="20" height="14" onerror="this.style.display='none'">`:''}
          <span class="tname-sm">${t.team}</span>
        </div></td>
        <td>${t.played}</td><td>${t.won}</td><td>${t.drawn}</td><td>${t.lost}</td>
        <td class="pts">${t.points}</td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  });
  if(html) document.getElementById('standings-wrap').innerHTML=html;
}

/* ─── RSS ─── */
async function fetchRSS(){
  if(!RSS_FEED_URL) return;
  const body=document.getElementById('rss-body');
  body.innerHTML=`<div class="rss-loading">
    <div class="rss-sk-line sk"></div><div class="rss-sk-short sk"></div>
    <div class="rss-sk-line sk"></div><div class="rss-sk-short sk"></div>
  </div>`;
  try{
    const proxy=`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_FEED_URL)}`;
    const res=await fetch(proxy);
    if(!res.ok) throw new Error();
    const j=await res.json();
    const items=(j.items||[]).slice(0,8);
    if(!items.length) throw new Error();
    const li=items.map(i=>{
      const d=new Date(i.pubDate).toLocaleDateString('zh-HK',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
      return `<li class="rss-item">
        <a href="${i.link}" target="_blank" rel="noopener noreferrer">${i.title}</a>
        <time>${d}</time>
        <span class="rss-source">${j.feed?.title||'新聞'}</span>
      </li>`;
    }).join('');
    body.innerHTML=`<ul class="rss-list">${li}</ul>`;
  }catch(e){
    body.innerHTML=`<div class="rss-empty"><div class="icon">📡</div><p>暫時無法載入新聞</p></div>`;
  }
}

/* ─── TABS ─── */
function sw(tab,el){
  curTab=tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  if(el?.classList?.contains('tab')) el.classList.add('on');
  renderAll();
}
function setBot(el){
  document.querySelectorAll('.bot-tab').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
}
function buildGroupTabs(){
  const nav=document.getElementById('navtabs');
  Object.entries(GC).forEach(([g,c])=>{
    const b=document.createElement('button');
    b.className='tab'; b.dataset.g=g;
    b.style.setProperty('--gc',c);
    b.textContent=`${g}組`;
    b.onclick=()=>sw(`G_${g}`,b);
    nav.appendChild(b);
  });
}

function setStatus(msg,color){
  document.getElementById('upd').textContent=msg;
  document.getElementById('api-dot').style.color=color;
  document.getElementById('quota').textContent=MAX-getQ();
}
function setLoading(on){
  const b=document.getElementById('btn-ref');
  b.disabled=on; b.classList.toggle('loading',on);
}
function manualRefresh(){ fetchAll(); fetchStandings(); }

/* ─── INIT ─── */
function init(){
  buildGroupTabs();
  document.getElementById('quota').textContent=MAX-getQ();
  renderAll();
  setStatus('靜態資料已就緒','#a080ea');

  // Lazy-load API on first interaction or after 800ms
  let fetched=false;
  function doFetch(){
    if(fetched) return; fetched=true;
    fetchAll();
    fetchStandings();
    fetchRSS();
  }
  setTimeout(doFetch, 800);
  document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible'&&!fetched) doFetch(); });
}

// Service Worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

document.addEventListener('DOMContentLoaded', init);
</script>
