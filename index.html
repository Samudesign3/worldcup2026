<!DOCTYPE html>
<html lang="zh-HK" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="2026 FIFA 世界盃完整賽程即時比分 香港時間">
<title>2026 世界盃 · HKT</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0F172A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{
  --bg:#0F172A;--card:#1E293B;--card2:#243348;--border:rgba(255,255,255,0.07);
  --text:#E2E8F0;--muted:#94A3B8;--faint:#475569;
  --accent:#a080ea;--accent2:#f25e8b;--live:#22c55e;--draw:#f59e0b;
  --r-sm:6px;--r-md:10px;--r-lg:16px;
  --fd:'Bebas Neue',sans-serif;--fb:'Inter',sans-serif;
  --gA:#0052FF;--gB:#FF5A1F;--gC:#00D2C4;--gD:#FF007A;
  --gE:#7928CA;--gF:#FF9900;--gG:#D4ED17;--gH:#C5A880;
  --gI:#E0A899;--gJ:#3A5046;--gK:#0A2540;--gL:#888888;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;font-size:16px}
body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100dvh;line-height:1.6}
img{display:block;max-width:100%;height:auto}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
a{color:inherit;text-decoration:none}

@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.sk{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:var(--r-sm)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.live-dot{display:inline-block;width:7px;height:7px;background:var(--live);border-radius:50%;animation:pulse 1.2s ease-in-out infinite;margin-right:4px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* HEADER */
header{position:sticky;top:0;z-index:200;background:rgba(15,23,42,.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{font-size:1.4rem;line-height:1}
.logo-text{font-family:var(--fd);font-size:clamp(1rem,3vw,1.35rem);letter-spacing:.06em;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.api-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);background:var(--card);padding:4px 10px;border-radius:var(--r-sm);border:1px solid var(--border);white-space:nowrap}
#api-dot{font-size:8px}
#quota{color:var(--accent);font-weight:700}
.btn-ref{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:6px 12px;border-radius:var(--r-sm);transition:opacity .18s;white-space:nowrap}
.btn-ref:hover{opacity:.85}
.btn-ref svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}
.btn-ref.loading svg{animation:spin .7s linear infinite}

/* NAV */
.nav-tabs{display:flex;align-items:center;gap:4px;padding:8px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);background:rgba(15,23,42,.7);position:sticky;top:53px;z-index:100;backdrop-filter:blur(12px)}
.nav-tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:5px 13px;border-radius:var(--r-sm);font-size:12px;color:var(--muted);border:1px solid transparent;transition:all .16s;white-space:nowrap;font-weight:500}
.tab:hover{color:var(--text);background:var(--card)}
.tab.on{color:#fff;background:var(--card2);border-color:var(--border);font-weight:700}
.tab[data-g]{border-left:3px solid var(--gc,var(--faint))}

/* LAYOUT */
main{max-width:1200px;margin:0 auto;padding:18px 16px;display:grid;grid-template-columns:1fr 290px;gap:20px;align-items:start}
@media(max-width:900px){main{grid-template-columns:1fr;padding:12px;padding-bottom:80px}}

/* SECTION */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-family:var(--fd);font-size:clamp(1rem,2.5vw,1.25rem);letter-spacing:.08em}
.count-badge{font-size:11px;color:var(--muted);background:var(--card);padding:3px 9px;border-radius:var(--r-sm);border:1px solid var(--border)}

/* DATE GROUP */
.dg{margin-bottom:22px}
.date-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;padding:5px 0;margin-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.date-lbl.today{color:var(--accent)}

/* MATCH CARD */
.mc{background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px 9px;margin-bottom:9px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;position:relative;overflow:hidden;transition:background .16s,box-shadow .16s;cursor:default}
.mc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gc,var(--faint))}
.mc:hover{background:var(--card2);box-shadow:0 4px 18px rgba(0,0,0,.25)}
.mc.live{border-color:rgba(34,197,94,.3);box-shadow:0 0 0 1px rgba(34,197,94,.1)}
.mc.live::before{background:var(--live)}
.mc.done{opacity:.7}

/* TEAM BLOCK */
.tb{display:flex;flex-direction:column;align-items:flex-end;gap:4px;text-align:right}
.tb.away{align-items:flex-start;text-align:left}
@media(max-width:400px){.tb,.tb.away{align-items:center;text-align:center}}
.flag{width:36px;height:24px;border-radius:3px;object-fit:cover;background:var(--card2);flex-shrink:0}
.tname{font-size:13px;font-weight:600;color:var(--text);max-width:105px;word-break:keep-all;line-height:1.3}
.tname.placeholder{color:var(--muted);font-size:11px;font-weight:500}

/* SCORE CENTER */
.sc{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:76px}
.score{font-family:var(--fd);font-size:clamp(1.25rem,3.5vw,1.85rem);letter-spacing:.06em;line-height:1}
.score.vs{font-family:var(--fb);font-size:13px;font-weight:700;color:var(--accent)}
.mtime{font-size:11px;color:var(--muted)}
.badge{font-size:10px;font-weight:700;letter-spacing:.05em;padding:2px 6px;border-radius:3px;text-transform:uppercase}
.b-live{background:rgba(34,197,94,.15);color:var(--live)}
.b-ft{background:rgba(148,163,184,.1);color:var(--muted)}
.b-draw{background:rgba(245,158,11,.12);color:var(--draw)}
.b-pen{background:rgba(160,128,234,.15);color:var(--accent)}
.mc-goals{grid-column:1/-1;font-size:10px;color:var(--muted);padding:3px 0 1px;border-top:1px solid var(--border);line-height:1.6;word-break:break-word}

/* CARD FOOTER */
.mc-foot{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px;margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.stage-chip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;background:color-mix(in srgb,var(--gc,var(--faint)) 14%,transparent);color:var(--gc,var(--muted));border:1px solid color-mix(in srgb,var(--gc,var(--faint)) 25%,transparent);white-space:nowrap}
.meta-r{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.meta-item{font-size:10px;color:var(--faint);display:flex;align-items:center;gap:2px}
.tv-chip{font-size:10px;padding:2px 6px;border-radius:3px;white-space:nowrap;border:1px solid}
.viu{background:rgba(242,94,139,.1);border-color:rgba(242,94,139,.25);color:#f25e8b}
.now{background:rgba(0,82,255,.1);border-color:rgba(0,82,255,.25);color:#6699ff}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;gap:14px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden}
.ph{display:flex;align-items:center;gap:8px;padding:9px 13px;border-bottom:1px solid var(--border);font-family:var(--fd);font-size:.95rem;letter-spacing:.07em}
.gdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* STANDINGS */
.stb{width:100%;border-collapse:collapse}
.stb th{font-size:10px;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:5px 9px;text-align:center}
.stb th:first-child{text-align:left}
.stb td{font-size:11px;padding:5px 9px;text-align:center;border-top:1px solid var(--border)}
.stb td:first-child{text-align:left}
.stb .pts{font-weight:700;color:var(--accent)}
.tcell{display:flex;align-items:center;gap:5px}
.fsm{width:18px;height:13px;border-radius:2px;object-fit:cover;background:var(--card2);flex-shrink:0}
.adv td:first-child .tcell::after{content:'↑';font-size:9px;color:var(--live);margin-left:2px}

/* RSS */
#rss-news-feed{background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden}
.rss-hdr{padding:9px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-family:var(--fd);font-size:.95rem;letter-spacing:.07em}
.rss-icon{width:15px;height:15px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rss-list{list-style:none}
.rss-item{padding:9px 13px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:3px}
.rss-item:first-child{border-top:none}
.rss-item a{color:var(--text);font-size:12px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rss-item a:hover{color:var(--accent)}
.rss-item time{font-size:10px;color:var(--faint)}
.rss-source{font-size:10px;color:var(--faint);background:var(--card2);padding:1px 5px;border-radius:3px;width:fit-content}
.rss-empty{padding:28px 14px;text-align:center;color:var(--faint);font-size:12px}

/* EMPTY */
.empty-state{display:flex;flex-direction:column;align-items:center;text-align:center;padding:50px 20px;color:var(--muted)}
.empty-state .ico{font-size:2.2rem;margin-bottom:10px}
.empty-state h3{color:var(--text);font-size:14px;margin-bottom:5px}
.empty-state p{font-size:12px;max-width:26ch}

/* SKELETON */
.sk-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px;margin-bottom:9px;display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center}
.sk-t{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.sk-t.r{align-items:flex-start}
.sk-flag{width:36px;height:24px;border-radius:3px}
.sk-name{height:12px;width:70px;border-radius:3px}
.sk-score{width:60px;height:26px;border-radius:4px}

/* BOTTOM NAV */
.bot-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(15,23,42,.96);backdrop-filter:blur(16px);border-top:1px solid var(--border);padding:6px 4px calc(6px + env(safe-area-inset-bottom));z-index:200;gap:2px}
@media(max-width:600px){.bot-bar{display:flex}}
.bot-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 4px;border-radius:var(--r-sm);font-size:10px;color:var(--muted);transition:color .16s,background .16s}
.bot-tab.on{color:var(--accent);background:rgba(160,128,234,.1)}
.bot-tab svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}

.hidden{display:none!important}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>

let apiCache = {};  // id → {homeScore,awayScore,status,liveMinute,homeTeam,awayTeam,penalties}

// ── QUOTA (session only, no localStorage) ──
let _q = 0;
function getQ(){ return _q; }
function addQ(n=1){ _q+=n; document.getElementById('quota').textContent = MAX_Q-_q; }
function canQ(){ return _q < MAX_Q; }

// ── DATE/TIME HELPERS ──
function todayHKT(){
  return new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Hong_Kong'});
}
function fmtDate(d){
  const dt = new Date(d+'T00:00:00+08:00');
  return dt.toLocaleDateString('zh-HK',{timeZone:'Asia/Hong_Kong',month:'long',day:'numeric',weekday:'short'});
}
function fmtTime(t){
  if(!t||t==='待定') return '待定';
  const p=t.split(':'); if(p.length<2) return t;
  const h=parseInt(p[0],10), m=p[1];
  if(h===0)  return `午夜 12:${m}`;
  if(h<6)    return `凌晨 ${h}:${m}`;
  if(h<12)   return `早上 ${h}:${m}`;
  if(h===12) return `中午 12:${m}`;
  if(h<18)   return `下午 ${h-12}:${m}`;
  return `晚上 ${h-12}:${m}`;
}

// ── TV CHIPS ──
function tvChips(tv){
  if(!tv) return '';
  let o='';
  if(/viu/i.test(tv))  o+=`<span class="tv-chip viu">Viu 99</span>`;
  if(/618/.test(tv))   o+=`<span class="tv-chip now">Now 618/616</span>`;
  if(/619/.test(tv))   o+=`<span class="tv-chip now">Now 619/617</span>`;
  return o;
}

// ── FLAG URL ──
function flagUrl(name){
  const iso = FLAG[name];
  return iso ? `https://flagcdn.com/w40/${iso}.png` : '';
}

// ── RENDER ONE CARD ──
function renderCard(m){
  const c   = apiCache[m.id] || {};
  const hs  = c.homeScore ?? null;
  const as  = c.awayScore ?? null;
  const st  = c.status || '';
  const live = st==='live'||st==='in_progress';
  const done = st==='finished'||st==='ft'||st==='finalized';
  const pen  = c.penalties;

  // Resolve display names: for KO matches, API may have real teams
  const homeName = c.homeCN || m.home;
  const awayName = c.awayCN || m.away;
  const isPlaceholder = h => !h || h.endsWith('名')||h.includes('強賽事')||h.includes('場勝')||h.includes('季軍戰')||h==='決賽'||h.includes('4強賽');

  const gc  = m.group ? GC[m.group] : '#a080ea';
  const hf  = flagUrl(homeName);
  const af  = flagUrl(awayName);

  // Score block
  let scoreHtml;
  if(live){
    const min = c.liveMinute ? `${c.liveMinute}'` : 'LIVE';
    scoreHtml = `<div class="score">${hs??0} - ${as??0}</div><span class="badge b-live"><span class="live-dot"></span>${min}</span>`;
  } else if(done && hs!==null && as!==null){
    const draw = hs===as;
    const penTxt = pen ? ` (P ${pen.home}-${pen.away})` : '';
    scoreHtml = `<div class="score">${hs} - ${as}</div><span class="badge ${draw?'b-draw':'b-ft'}">${pen?'AET':'FT'}${penTxt}</span>`;
  } else {
    scoreHtml = `<div class="score vs">${fmtTime(m.time)}</div><div class="mtime">HKT · #${m.no}</div>`;
  }

  const hFlag = hf ? `<img class="flag" src="${hf}" alt="${homeName}" loading="lazy" width="36" height="24" onerror="this.style.display='none'">` : '';
  const aFlag = af ? `<img class="flag" src="${af}" alt="${awayName}" loading="lazy" width="36" height="24" onerror="this.style.display='none'">` : '';
  const hPH = isPlaceholder(homeName) ? ' placeholder' : '';
  const aPH = isPlaceholder(awayName) ? ' placeholder' : '';

  // Goalscorers — API: goals:[{minute,team,scorer}]
  let gsHtml = '';
  if(done && Array.isArray(c.goalscorers) && c.goalscorers.length){
    const lines = c.goalscorers.map(g=>{
      const name = g.scorer || g.playerName || g.name || '';
      if(!name) return null;
      const min  = g.minute ? `${g.minute}'` : '';
      const own  = g.ownGoal || g.own_goal ? ' (og)' : '';
      const pen  = g.penalty ? ' (pen)' : '';
      const side = g.team === 'away' ? '←' : '';
      return `${side}${name}${own}${pen}${min?' '+min:''}`;
    }).filter(Boolean);
    if(lines.length) gsHtml = `<div class="mc-goals">⚽ ${lines.join(' · ')}</div>`;
  }

  return `<div class="mc${live?' live':''}${done?' done':''}" style="--gc:${gc}" role="listitem">
  <div class="tb">
    ${hFlag}<div class="tname${hPH}">${homeName||'—'}</div>
  </div>
  <div class="sc">${scoreHtml}</div>
  <div class="tb away">
    ${aFlag}<div class="tname${aPH}">${awayName||'—'}</div>
  </div>
  ${gsHtml}
  <div class="mc-foot">
    <span class="stage-chip" style="--gc:${gc}">${m.stage}</span>
    <div class="meta-r">
      <span class="meta-item">🏟 ${m.city}</span>
      ${tvChips(m.tv)}
    </div>
  </div>
</div>`;
}

// ── FILTER ──
function getFiltered(){
  const today = todayHKT();
  if(curTab==='live')  return MATCHES.filter(m=>{const s=apiCache[m.id]?.status||''; return s==='live'||s==='in_progress';});
  if(curTab==='today') return MATCHES.filter(m=>m.date===today);
  if(curTab==='group') return MATCHES.filter(m=>m.stageKey==='group');
  if(curTab==='ko')    return MATCHES.filter(m=>m.stageKey!=='group');
  if(curTab.startsWith('G_')){ const g=curTab.slice(2); return MATCHES.filter(m=>m.group===g); }
  return MATCHES;
}

// ── RENDER ALL ──
function renderAll(){
  const list  = getFiltered();
  const today = todayHKT();
  const byDate = {};
  list.forEach(m=>{(byDate[m.date]||(byDate[m.date]=[])).push(m);});
  const dates = Object.keys(byDate).sort();
  let html = '';
  if(!dates.length){
    html = `<div class="empty-state"><div class="ico">⚽</div><h3>暫無賽事</h3><p>此分類目前沒有比賽</p></div>`;
  } else {
    dates.forEach(d=>{
      const isT = d===today;
      html += `<div class="dg"><div class="date-lbl${isT?' today':''}">
        ${isT?'📅 今日 · ':''}${fmtDate(d)}</div>`;
      byDate[d].forEach(m=>{ html += renderCard(m); });
      html += '</div>';
    });
  }
  document.getElementById('mlist').innerHTML = html;
  document.getElementById('cnt').textContent = `${list.length} 場`;
  const labels = {all:'所有賽事',live:'🔴 即時比賽',today:'📅 今日賽事',group:'小組賽',ko:'淘汰賽'};
  document.getElementById('sec-title').textContent = labels[curTab]||(curTab.startsWith('G_')?curTab.slice(2)+'組賽事':'賽事');
}

// ── MERGE API DATA ──
function mergeApi(data){
  const HKT = 8*60*60*1000;
  data.forEach(m=>{
    if(!m||typeof m!=='object') return;
    if(!m.homeTeam || !m.awayTeam) return;

    // Pure team-name matching — never use API id (API ids ≠ xlsx ids)
    let local = MATCHES.find(lm=>
      lm.enHome === m.homeTeam && lm.enAway === m.awayTeam
    );
    // Reversed fallback (safety net)
    if(!local){
      local = MATCHES.find(lm=>
        lm.enHome === m.awayTeam && lm.enAway === m.homeTeam
      );
    }
    // HKT-date tiebreaker for future fixtures with same teams
    if(!local && m.kickoffUtc){
      const hktDate = new Date(new Date(m.kickoffUtc).getTime()+HKT).toISOString().slice(0,10);
      local = MATCHES.find(lm=>
        lm.enHome === m.homeTeam && lm.enAway === m.awayTeam && lm.date === hktDate
      );
    }
    if(!local) return;

    const prev = apiCache[local.id] || {};
    prev.homeScore  = m.homeScore  ?? m.home_score  ?? prev.homeScore  ?? null;
    prev.awayScore  = m.awayScore  ?? m.away_score  ?? prev.awayScore  ?? null;
    prev.status     = m.status     || prev.status    || null;
    // liveMinute can be empty string from API — only store truthy values
    prev.liveMinute = m.liveMinute || m.minute || prev.liveMinute || null;
    prev.penalties  = m.penalties  || prev.penalties || null;

    // Goalscorers: API uses goals:[{minute,team,scorer}]
    if(Array.isArray(m.goals) && m.goals.length){
      prev.goalscorers = m.goals;
    }

    // For KO matches: update team names if API has real teams
    if(local.stageKey !== 'group'){
      const hCN = EN_CN[m.homeTeam];
      const aCN = EN_CN[m.awayTeam];
      if(hCN) prev.homeCN = hCN;
      if(aCN) prev.awayCN = aCN;
    }
    apiCache[local.id] = prev;
  });
}

// ── FETCH MATCHES ──
async function fetchAll(){
  if(!canQ()){ setStatus('⚠ 配額已用盡','#FF9900'); return; }
  setLoading(true);
  try{
    const hdrs = {'X-API-Key': KEY};
    const etag = sessionStorage.getItem('wc26_etag');
    if(etag) hdrs['If-None-Match'] = etag;
    const res = await fetch(`${API}/matches?year=2026`, {headers:hdrs});
    if(res.status===304){
      setStatus('✓ 已是最新','#22c55e');
    } else if(res.ok){
      addQ();
      const ne = res.headers.get('ETag'); if(ne) sessionStorage.setItem('wc26_etag',ne);
      const raw = await res.json();
      const data = Array.isArray(raw) ? raw : (raw.matches||raw.data||[]);
      mergeApi(data);
      setStatus(`✓ 已更新 ${new Date().toLocaleTimeString('zh-HK',{timeZone:'Asia/Hong_Kong',hour:'2-digit',minute:'2-digit'})}`, '#22c55e');
    } else {
      setStatus(`API ${res.status}`,'#f25e8b');
    }
  } catch(e){
    setStatus('網絡錯誤','#FF9900');
  }
  setLoading(false);
  renderAll();
}

// ── FETCH STANDINGS ──
async function fetchStandings(){
  if(!canQ()) return;
  try{
    const res = await fetch(`${API}/standings?year=2026`, {'headers':{'X-API-Key':KEY}});
    if(!res.ok) return;
    addQ();
    const j = await res.json();
    renderStandings(j.groups||j.data||{});
  } catch(e){}
}

// ── RENDER STANDINGS ──
function renderStandings(groups){
  const allGroups = ['A','B','C','D','E','F','G','H','I','J','K','L'];
  let html = '';
  allGroups.forEach(g=>{
    const list = groups[g];
    if(!list||!list.length) return;
    const gc = GC[g];
    html += `<div class="panel" style="margin-bottom:10px">
      <div class="ph"><span class="gdot" style="background:${gc}"></span>${g}組</div>
      <table class="stb"><thead><tr>
        <th>球隊</th><th>場</th><th>勝</th><th>平</th><th>負</th><th>分</th>
      </tr></thead><tbody>`;
    list.forEach((t,i)=>{
      const name = EN_CN[t.team||t.name||''] || t.team||t.name||'';
      const f = flagUrl(name);
      const adv = i<3 ? ' adv' : '';
      html += `<tr class="${adv}"><td><div class="tcell">
        ${f?`<img class="fsm" src="${f}" alt="${name}" loading="lazy" width="18" height="13" onerror="this.style.display='none'">`:''}
        <span>${name}</span></div></td>
        <td>${t.played??t.gamesPlayed??'-'}</td>
        <td>${t.won??t.wins??'-'}</td>
        <td>${t.drawn??t.draws??'-'}</td>
        <td>${t.lost??t.losses??'-'}</td>
        <td class="pts">${t.points??'-'}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  });
  if(html) document.getElementById('standings-wrap').innerHTML = html;
}

// ── RSS ──
async function fetchRSS(){
  if(!RSS_FEED_URL) return;
  const body = document.getElementById('rss-body');
  try{
    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_FEED_URL)}`);
    if(!res.ok) throw new Error();
    const j = await res.json();
    const items = (j.items||[]).slice(0,8);
    if(!items.length) throw new Error();
    body.innerHTML = `<ul class="rss-list">${items.map(item=>{
      const dt = new Date(item.pubDate).toLocaleDateString('zh-HK',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
      return `<li class="rss-item">
        <a href="${item.link}" target="_blank" rel="noopener noreferrer">${item.title}</a>
        <time>${dt}</time>
        <span class="rss-source">${j.feed?.title||'新聞'}</span>
      </li>`;
    }).join('')}</ul>`;
  } catch(e){
    body.innerHTML = `<div class="rss-empty">⚡ 暫時無法載入新聞</div>`;
  }
}

// ── TAB SWITCH ──
function sw(tab, el){
  curTab = tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  if(el?.classList?.contains('tab')) el.classList.add('on');
  renderAll();
}
function setBot(el){
  document.querySelectorAll('.bot-tab').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
}

// ── BUILD GROUP TABS ──
function buildGroupTabs(){
  const nav = document.getElementById('navtabs');
  Object.entries(GC).forEach(([g,c])=>{
    const b = document.createElement('button');
    b.className = 'tab'; b.dataset.g = g;
    b.style.setProperty('--gc', c);
    b.setAttribute('role','tab');
    b.textContent = `${g}組`;
    b.onclick = ()=>sw(`G_${g}`, b);
    nav.appendChild(b);
  });
}

// ── STATUS ──
function setStatus(msg, color){
  document.getElementById('upd-msg').textContent = msg;
  document.getElementById('api-dot').style.color = color;
  document.getElementById('quota').textContent = MAX_Q - _q;
}
function setLoading(on){
  const b = document.getElementById('btn-ref');
  b.disabled = on;
  b.classList.toggle('loading', on);
}
function manualRefresh(){
  sessionStorage.removeItem('wc26_etag');
  fetchAll();
  fetchStandings();
}

// ── INIT ──
function init(){
  buildGroupTabs();
  document.getElementById('quota').textContent = MAX_Q;
  // Render static data immediately
  renderAll();
  setStatus('靜態資料就緒','#a080ea');

  // Fetch API after short delay, only once on open
  const doFetch = ()=>{
    if(fetchDone) return;
    fetchDone = true;
    fetchAll();
    fetchStandings();
    fetchRSS();
  };
  setTimeout(doFetch, 600);

  // Re-fetch when tab becomes visible again (only if was hidden >5min)
  let hiddenAt = 0;
  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='hidden'){ hiddenAt=Date.now(); }
    else if(Date.now()-hiddenAt > 300000){ fetchDone=false; doFetch(); }
  });

  window.addEventListener('online', ()=>{ fetchDone=false; doFetch(); });
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
